app = "credit-default-api"
primary_region = "sjc"

[build]
  dockerfile = "api/Dockerfile"

[env]
  PORT = "8000"
  MODEL_NAME = "CreditDefaultModel"
  MODEL_ALIAS = "champion"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
