app = "credit-default-api"
primary_region = "sjc"

[build]
  dockerfile = "api/Dockerfile"

[env]
  PORT = "8000"
  MODEL_NAME = "CreditDefaultModel"
  MODEL_ALIAS = "champion"

# CatBoost + MLflow + sklearn stack needs ~400MB at startup.
# 512MB gives headroom; swap is a safety net against spikes.
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true   # stop when idle → no compute cost
  auto_start_machines = true
  min_machines_running = 0    # scale to zero between requests

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  swap_size_mb = 256          # slow but prevents OOM crash on spikes
